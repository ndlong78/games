<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#7ecbff" />
  <title>Hoa Quả Bay Mắt Vui</title>
  <meta name="description" content="Game chém hoa quả dễ thương cho bé 4-8 tuổi, hỗ trợ tập trung thị giác và phản xạ tay-mắt." />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" sizes="192x192" href="./assets/icons/icon-192.png" />
  <link rel="icon" type="image/png" href="./assets/icons/icon-192.png" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div id="app">
    <header class="hud" id="hud">
      <div>⭐ <span id="hud-score">0</span></div>
      <div>⏱ <span id="hud-time">120s</span></div>
      <div>❤️ <span id="hud-hearts">3</span></div>
      <div>🔥 <span id="hud-combo">x1</span></div>
      <button id="btn-stop" class="hud-stop">Dừng</button>
    </header>

    <main id="screen-menu" class="screen active">
      <h1>🍉 Hoa Quả Bay Mắt Vui</h1>
      <p>Vuốt tay để cắt trái cây dễ thương nhé!</p>
      <div class="menu-actions">
        <button id="btn-start">Chơi ngay</button>
        <button id="btn-parent">Chế độ phụ huynh</button>
      </div>
      <p class="note"><span id="menu-level">Phiên 2 phút liên tục</span></p>
    </main>

    <section id="screen-game" class="screen">
      <canvas id="game-canvas"></canvas>
      <div id="goal-banner" class="goal-banner hidden"></div>
    </section>

    <section id="screen-result" class="screen">
      <h2 id="result-title">Hoàn thành rồi!</h2>
      <p id="result-message">Con đã chơi rất tốt!<br/>Cùng xem thành quả nhé!</p>
      <div id="result-stars" class="stars"></div>
      <div id="result-stats"></div>
      <div class="menu-actions">
        <button id="btn-replay">Chơi lại</button>
        <button id="btn-menu">Về menu</button>
      </div>
    </section>

    <section id="screen-parent" class="screen">
      <h2>👨‍👩‍👧 Chế độ phụ huynh</h2>
      <div id="parent-lock">
        <p>Nhập mã phụ huynh (mặc định 1234)</p>
        <input id="parent-pin" type="password" maxlength="4" inputmode="numeric" placeholder="••••" />
        <button id="btn-unlock">Mở báo cáo</button>
      </div>
      <div id="parent-report" class="hidden">
        <div class="menu-actions">
          <button id="btn-change-pin">Đổi mã</button>
          <button id="btn-export-pdf">Xuất PDF</button>
        </div>
        <div id="report-list"></div>
      </div>
      <button id="btn-parent-back">← Quay lại</button>
    </section>

    <button id="btn-reset-cache" class="debug hidden">Reset Cache</button>
  </div>

  <script src="./js/config.js"></script>
  <script src="./js/layout.js"></script>
  <script src="./js/background.js"></script>
  <script src="./js/input.js"></script>
  <script src="./js/gameplay.js"></script>
  <script src="./js/screens.js"></script>
  <script src="./js/report.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
